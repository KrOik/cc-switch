name: Build and Release

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check workspace
        run: cargo check --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace

  build-x86_64:
    name: Build x86_64 Linux
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build TUI release
        run: cargo build --release -p cc-switch-tui

      - name: Strip binary
        run: strip target/release/cc-switch-tui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-tui-x86_64-linux
          path: target/release/cc-switch-tui

  build-arm64:
    name: Build ARM64 Linux
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build TUI release for ARM64
        run: cross build --release --target aarch64-unknown-linux-gnu -p cc-switch-tui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-tui-arm64-linux
          path: target/aarch64-unknown-linux-gnu/release/cc-switch-tui

  build-deb-arm64:
    name: Build ARM64 Debian Package
    runs-on: ubuntu-latest
    needs: build-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross and dpkg-dev
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build ARM64 .deb package
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh

      - name: Upload .deb package
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-tui-arm64-deb
          path: cc-switch-tui_3.11.1_arm64.deb

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-x86_64, build-arm64, build-deb-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release archives
        run: |
          cd cc-switch-tui-x86_64-linux
          tar czf ../cc-switch-tui-x86_64-linux.tar.gz cc-switch-tui
          cd ..

          cd cc-switch-tui-arm64-linux
          tar czf ../cc-switch-tui-arm64-linux.tar.gz cc-switch-tui
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cc-switch-tui-x86_64-linux.tar.gz
            cc-switch-tui-arm64-linux.tar.gz
            cc-switch-tui-arm64-deb/cc-switch-tui_3.11.1_arm64.deb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
